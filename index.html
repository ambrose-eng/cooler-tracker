<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GSL Cooler Box Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- No external scanner library — using native BarcodeDetector API + jsQR fallback -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
      --border:#30363d;--text:#e6edf3;--muted:#7d8590;
      --green:#22c55e;--green-dim:#14532d;
      --red:#ef4444;--red-dim:#7f1d1d;
      --amber:#eab308;--amber-dim:#422006;
      --blue:#3b82f6;--blue-dim:#1e3a5f;
      --orange:#f97316;
      --radius:10px;--font:system-ui,-apple-system,sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-text-size-adjust:100%;overscroll-behavior-y:contain}
    .screen{display:none;min-height:100vh}
    .screen.active{display:block}
    /* HEADER */
    .header{background:var(--surface);border-bottom:2px solid var(--orange);padding:12px 16px;position:sticky;top:0;z-index:100}
    .header-row{display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:16px;font-weight:800;letter-spacing:0.04em;color:var(--orange)}
    .logo span{color:var(--muted);font-weight:400}
    .badge{background:var(--orange);color:#000;font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px;min-width:36px;text-align:center}
    /* CONTENT */
    .content{padding:14px;max-width:560px;margin:0 auto;padding-bottom:30px}
    .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;margin-top:4px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px}
    .card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:12px}
    /* FORMS */
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px}
    select,input[type=text],input[type=password]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:15px;padding:11px 12px;margin-bottom:12px;outline:none;-webkit-appearance:none}
    select:focus,input:focus{border-color:var(--orange)}
    select option{background:var(--surface2)}
    /* BUTTONS */
    .btn{display:block;width:100%;padding:13px;border-radius:8px;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:0.04em;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
    .btn:active{opacity:0.8}
    .btn:disabled{opacity:0.35;cursor:not-allowed}
    .btn-orange{background:var(--orange);color:#000}
    .btn-green{background:var(--green);color:#000}
    .btn-red{background:var(--red);color:#fff}
    .btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
    .btn-sm{padding:7px 14px;font-size:12px;width:auto;display:inline-block;margin-bottom:0}
    /* NAV */
    .nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
    .nav-btn{flex:1;min-width:60px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;padding:10px 6px 9px;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}
    .nav-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
    /* SCANNER */
    #scanner-wrap{display:none;margin-bottom:12px;border-radius:10px;overflow:hidden;position:relative;background:#000}
    #scanner-wrap.active{display:block}
    #qr-video{width:100%;display:block;border-radius:10px}
    #qr-canvas{display:none}
    .scan-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
    .scan-box{width:65%;aspect-ratio:1.8;border:3px solid var(--orange);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);position:relative}
    .scan-box::before,.scan-box::after{content:'';position:absolute;width:16px;height:16px;border-color:var(--orange);border-style:solid}
    .scan-box::before{top:-3px;left:-3px;border-width:4px 0 0 4px}
    .scan-box::after{bottom:-3px;right:-3px;border-width:0 4px 4px 0}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);animation:scanmove 1.5s ease-in-out infinite}
    @keyframes scanmove{0%,100%{top:10%}50%{top:85%}}
    .scan-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.8);font-size:12px;font-weight:600;letter-spacing:0.04em;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
    .scan-btn{background:var(--blue);color:#fff;border:none;font-family:var(--font);font-size:14px;font-weight:700;padding:12px;border-radius:8px;cursor:pointer;width:100%;margin-bottom:10px;-webkit-tap-highlight-color:transparent}
    .scan-btn.stop{background:var(--red-dim);border:1px solid var(--red);color:var(--red)}
    /* BOX QUEUE */
    .queue-label{font-size:11px;color:var(--muted);margin-bottom:5px}
    .box-queue{min-height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .box-chip{display:inline-flex;align-items:center;gap:6px;background:var(--blue-dim);border:1px solid var(--blue);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--blue);font-family:monospace}
    .box-chip-remove{background:none;border:none;color:var(--blue);cursor:pointer;font-size:16px;padding:0;line-height:1}
    .box-queue-empty{color:var(--muted);font-size:12px;font-style:italic}
    /* ACTION TOGGLE */
    .action-toggle{display:flex;gap:8px;margin-bottom:12px}
    .action-btn{flex:1;padding:13px;border-radius:8px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-family:monospace;font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .action-btn.sel-out{border-color:var(--orange);background:var(--amber-dim);color:var(--orange)}
    .action-btn.sel-in{border-color:var(--green);background:var(--green-dim);color:var(--green)}
    /* BOX INPUT */
    #box-input{font-family:monospace;font-size:22px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-align:center;padding:14px 12px;border:2px solid var(--border);color:var(--orange)}
    #box-input:focus{border-color:var(--orange)}
    #box-input::placeholder{color:var(--border);font-size:16px}
    /* OUT LIST */
    .out-stat{font-size:42px;font-weight:800;color:var(--orange);line-height:1}
    .out-stat-label{font-size:12px;color:var(--muted);margin-top:3px}
    .driver-group{margin-bottom:16px}
    .driver-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px 8px 0 0;border-bottom:none}
    .driver-group-name{font-size:14px;font-weight:700}
    .driver-group-count{font-size:12px;color:var(--orange);font-weight:700}
    .box-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-top:none;gap:10px}
    .box-row:last-child{border-radius:0 0 8px 8px}
    .box-row-id{font-family:monospace;font-size:17px;font-weight:700;letter-spacing:0.06em}
    .box-row-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .box-row-time{text-align:right;flex-shrink:0}
    .box-row-hrs{font-size:16px;font-weight:700;color:var(--orange)}
    .box-row-ts{font-size:11px;color:var(--muted);display:block}
    .trip-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--muted);margin-left:5px;vertical-align:middle}
    .check-in-btn{background:var(--green-dim);border:1px solid var(--green);color:var(--green);font-family:var(--font);font-size:11px;font-weight:700;padding:5px 10px;bo
